<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Evellyn 💜</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#7b2cbf,#240046);
color:white;
text-align:center;
overflow-x:hidden;
}

.stars{
position:fixed;
width:100%;
height:100%;
z-index:-2;
}

.stars span{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
0%,100%{opacity:0.2}
50%{opacity:1}
}

.container{
padding:40px 20px;
max-width:500px;
margin:auto;
}

.countdown{
font-size:24px;
margin-top:20px;
font-weight:bold;
}

.message-box{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:20px;
margin-top:25px;
}

.special{
font-size:22px;
margin-top:10px;
font-weight:bold;
}

img{
width:100%;
border-radius:20px;
margin-top:15px;
}

audio{
margin-top:20px;
width:100%;
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<h1>Algo mágico está a ser preparado para ti, Evellyn 💜</h1>

<div class="countdown" id="countdown"></div>

<div class="message-box">

<p>Enquanto o teu presente não chega...</p>

<div class="special">Te amo muito bebê 💜</div>

<img src="primeirafoto.jpe">

<p style="margin-top:20px">Uma música para ti 💜</p>

<audio controls>
<source src="Music1.mp3" type="audio/mpeg">
</audio>

</div>

</div>

<script>

const starsContainer=document.getElementById("stars")

for(let i=0;i<80;i++){
const star=document.createElement("span")
star.style.top=Math.random()*100+"%"
star.style.left=Math.random()*100+"%"
star.style.animationDuration=(Math.random()*3+2)+"s"
starsContainer.appendChild(star)
}

const targetDate=new Date("March 27, 2026 00:00:00").getTime()

const countdownFunction=setInterval(function(){

const now=new Date().getTime()
const distance=targetDate-now

const days=Math.floor(distance/(1000*60*60*24))
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60))
const minutes=Math.floor((distance%(1000*60*60))/(1000*60))
const seconds=Math.floor((distance%(1000*60))/1000)

document.getElementById("countdown").innerHTML=
days+"d "+hours+"h "+minutes+"m "+seconds+"s"

},1000)

</script>

</body>
</html>
